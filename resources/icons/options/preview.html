<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ghost Replay Icon Options</title>
<style>
  :root {
    color-scheme: dark;
    background: #0d0b12;
    color: #faf0e6;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  body {
    margin: 0;
    padding: 32px;
    background: #0d0b12;
  }
  h1 {
    margin: 0 0 24px;
    font-size: 20px;
    font-weight: 600;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    max-width: 1120px;
  }
  figure {
    margin: 0;
    padding: 18px;
    border: 1px solid #2c2638;
    border-radius: 12px;
    background: #14111c;
  }
  img {
    display: block;
    width: 128px;
    height: 128px;
    margin: 0 auto 14px;
  }
  figcaption {
    color: #b9b4c7;
    font-size: 13px;
    text-align: center;
  }
</style>
<h1>Ghost Replay Icon Options</h1>
<div class="grid">
  <figure><img src="ghostreplay-icon-01-phantom-play.svg" alt=""><figcaption>01 Phantom Play</figcaption></figure>
  <figure><img src="ghostreplay-icon-02-loop-mark.svg" alt=""><figcaption>02 Loop Mark</figcaption></figure>
  <figure><img src="ghostreplay-icon-03-capture-play.svg" alt=""><figcaption>03 Capture Play</figcaption></figure>
  <figure><img src="ghostreplay-icon-04-window-replay.svg" alt=""><figcaption>04 Window Replay</figcaption></figure>
  <figure><img src="ghostreplay-icon-05-gr-monogram.svg" alt=""><figcaption>05 GR Monogram</figcaption></figure>
  <figure><img src="ghostreplay-icon-06-spectral-frame.svg" alt=""><figcaption>06 Spectral Frame</figcaption></figure>
</div>
